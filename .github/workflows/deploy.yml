name: Deploy Notes App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests
        working-directory: backend
        run: npm test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create ECR repository if it does not exist
        run: |
          aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" \
            || aws ecr create-repository --repository-name "${ECR_REPOSITORY}"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image name
        id: image
        run: echo "image=${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.image.outputs.image }}
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:cache
          cache-to: type=inline

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Validate deployment secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "$EC2_SSH_KEY"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.registry }}
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -e

          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "mkdir -p ~/notes-app"

          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "cat > ~/notes-app/docker-compose.yml" <<'EOF'
          services:
            mongo:
              image: mongo:7
              container_name: notes-mongo
              volumes:
                - mongo-data:/data/db
              restart: unless-stopped

            backend:
              image: ${IMAGE}
              container_name: notes-backend
              environment:
                PORT: 3000
                MONGO_URI: mongodb://mongo:27017/notes_app
              ports:
                - "127.0.0.1:3000:3000"
              depends_on:
                - mongo
              restart: unless-stopped

          volumes:
            mongo-data:
          EOF

          aws ecr get-login-password --region "$AWS_REGION" \
            | ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" \
              "if docker ps >/dev/null 2>&1; then docker login --username AWS --password-stdin '$ECR_REGISTRY'; else sudo docker login --username AWS --password-stdin '$ECR_REGISTRY'; fi"

          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" \
            "cd ~/notes-app && if docker ps >/dev/null 2>&1; then DOCKER=docker; else DOCKER='sudo docker'; fi && IMAGE='$IMAGE' \$DOCKER compose pull && IMAGE='$IMAGE' \$DOCKER compose up -d && \$DOCKER image prune -af"

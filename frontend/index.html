<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes App</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar" aria-label="Notes controls">
        <div>
          <p class="eyebrow">DevOps Notes</p>
          <h1>Notes App</h1>
          <p class="intro">Capture deployment steps, ideas, and fixes in one clean workspace.</p>
        </div>
        <div class="toolbar-meta">
          <div class="metric">
            <span id="note-count">0</span>
            <small>notes</small>
          </div>
          <div class="status" id="status">Connecting...</div>
        </div>
      </section>

      <section class="workspace">
        <form class="editor" id="note-form">
          <div class="form-heading">
            <h2 id="form-title">Create note</h2>
            <p>Keep your deployment thoughts organized.</p>
          </div>
          <div class="quick-templates" aria-label="Quick note templates">
            <button type="button" class="chip" data-template="deploy">Deploy</button>
            <button type="button" class="chip" data-template="bug">Bug fix</button>
            <button type="button" class="chip" data-template="learn">Learning</button>
          </div>
          <input type="hidden" id="note-id" />
          <label for="title">Title</label>
          <input id="title" name="title" type="text" maxlength="120" placeholder="Deployment checklist" required />

          <label for="content">Note</label>
          <textarea id="content" name="content" rows="8" maxlength="5000" placeholder="Write the next step..." required></textarea>
          <div class="character-count" id="character-count">0 / 5000</div>

          <div class="actions">
            <button type="submit" id="save-button">Save note</button>
            <button type="button" class="secondary" id="reset-button">New note</button>
          </div>
        </form>

        <section class="notes-panel" aria-live="polite">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Workspace</p>
              <h2>Your notes</h2>
            </div>
            <div class="panel-tools">
              <input id="search" type="search" placeholder="Search notes" aria-label="Search notes" />
              <select id="sort" aria-label="Sort notes">
                <option value="updated">Latest first</option>
                <option value="oldest">Oldest first</option>
                <option value="title">Title A-Z</option>
              </select>
            </div>
          </div>
          <div class="notes-grid" id="notes"></div>
        </section>
      </section>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="/app.js"></script>
  </body>
</html>

services:
  mongo:
    image: mongo:7
    container_name: notes-mongo
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    image: ${IMAGE}
    container_name: notes-backend
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/notes_app
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo-data:
